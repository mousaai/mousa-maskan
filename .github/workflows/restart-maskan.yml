name: Restart Maskan PM2
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for restart'
        required: false
        default: 'Manual PM2 restart'
jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
      - name: Restart PM2 maskan
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@${{ secrets.SERVER_HOST }} \
            'cd /var/www/mousa-maskan && pm2 restart maskan 2>/dev/null || pm2 restart mousa-maskan 2>/dev/null || (pm2 delete maskan 2>/dev/null; pm2 start ecosystem.config.cjs 2>/dev/null); pm2 save; sleep 3; pm2 logs maskan --lines 10 --nostream 2>/dev/null || pm2 logs mousa-maskan --lines 10 --nostream 2>/dev/null'
      - name: Verify
        run: |
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://maskan.mousa.ai)
          echo "maskan.mousa.ai status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ maskan.mousa.ai is UP"
          else
            echo "❌ maskan.mousa.ai returned $STATUS"
            exit 1
          fi
